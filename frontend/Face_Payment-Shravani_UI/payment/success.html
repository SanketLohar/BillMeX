<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillMeX - Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #0f172a;
        }
        .success-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: #d1fae5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px auto;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }
        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0f172a;
        }
        p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .amount-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .amount-box .label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .amount-box .value {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
        }
        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }
        .loader-dots div {
            width: 6px; height: 6px;
            background: #cbd5e1;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader-dots div:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots div:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .redirect-text {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 20px;
            margin-bottom: 5px;
        }
        #error-state {
            display: none;
        }
        #error-state .icon-circle {
            background: #fee2e2;
            color: #ef4444;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-top: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div class="success-card" id="loading-state">
        <h2 style="color:#64748b; font-size:18px; margin-top:20px;">Verifying Payment...</h2>
        <div class="loader-dots" style="margin-top:20px; margin-bottom:30px;">
            <div></div><div></div><div></div>
        </div>
    </div>

    <div class="success-card" id="success-state" style="display:none;">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        <h2>Payment Successful</h2>
        <p>Your transaction has been processed and applied to your invoice.</p>
        
        <div class="amount-box">
            <div class="label">Amount Paid</div>
            <div class="value" id="paid-amount">₹0.00</div>
        </div>

        <div class="redirect-text">Redirecting you securely...</div>
        <div class="loader-dots">
            <div></div><div></div><div></div>
        </div>
    </div>

    <div class="success-card" id="error-state">
        <div class="icon-circle">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 id="error-title">Verification Failed</h2>
        <p id="error-desc">We couldn't verify this payment or it is still pending.</p>
        <button class="btn" id="return-btn">Return to Login</button>
    </div>

    <!-- Need to load scripts without triggering aggressive redirects in auth.js -->
    <script>
        // Prevent inner auth load from redirecting
        window.SKIP_AUTH_INIT = true; 
    </script>
    <script src="../src/api.js"></script>
    <script src="success.js"></script>
</body>
</html>
